name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out Repository Source Tree
      uses: actions/checkout@v4

    - name: Initialize System Clock Synchronization
      run: |
        # Synchronize automated CI runner temporal alignment to UTC machine layer standard
        sudo timedatectl set-timezone UTC

    - name: Configure Python Deployment Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run Ruff Linter Checks
      run: ruff check .

    - name: Verify Black Code Formatting
      run: black --check .

    - name: Execute Automated Unit Test Suite
      run: pytest tests/ -v